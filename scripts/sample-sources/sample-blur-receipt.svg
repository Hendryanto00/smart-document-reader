<svg xmlns="http://www.w3.org/2000/svg" width="400" height="520" viewBox="0 0 400 520">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>
  <rect fill="#2a2a2a" width="400" height="520"/>
  <g fill="#ccc" font-family="monospace" font-size="11">
    <text x="200" y="45" text-anchor="middle" font-size="14" font-weight="bold">STARLIGHT CAFE</text>
    <text x="40" y="75">Date: 18/05/2026</text>
    <line x1="40" y1="88" x2="360" y2="88" stroke="#666"/>
    <text x="40" y="108" font-weight="bold">Item</text>
    <text x="200" y="108" font-weight="bold">Qty</text>
    <text x="250" y="108" font-weight="bold">Unit</text>
    <text x="320" y="108" font-weight="bold">Amount</text>
    <line x1="40" y1="113" x2="360" y2="113" stroke="#666"/>
  </g>
  <g filter="url(#blur)" fill="#ccc" font-family="monospace" font-size="11">
    <text x="40" y="135">Cappuccino</text>
    <text x="215" y="135" text-anchor="end">1</text>
    <text x="275" y="135" text-anchor="end">35,000</text>
    <text x="355" y="135" text-anchor="end">35,000</text>
    <text x="40" y="158">Chocolate Cake</text>
    <text x="215" y="158" text-anchor="end">1</text>
    <text x="275" y="158" text-anchor="end">50,000</text>
    <text x="355" y="158" text-anchor="end">50,000</text>
    <line x1="40" y1="172" x2="360" y2="172" stroke="#666"/>
    <text x="40" y="195" font-weight="bold">TOTAL</text>
    <text x="355" y="195" text-anchor="end" font-weight="bold">85,000</text>
  </g>
  <text x="200" y="450" text-anchor="middle" fill="#888" font-size="10">(poor lighting / blur test)</text>
</svg>
